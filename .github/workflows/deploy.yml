name: Deploy to Cloudflare Workers

# Triggers:
#   - pull_request to main  -> run the "validate" job only (typecheck). No
#                              secrets used, no deploy. Catches TS errors
#                              before a PR gets merged.
#   - push to main          -> run "validate" then "deploy". This is the path
#                              a PR merge takes: merging into main creates a
#                              push event on main.
#   - workflow_dispatch     -> manual run from the Actions tab; deploys only
#                              when dispatched from the main branch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN       scoped to "Edit Cloudflare Workers" + D1
#   CLOUDFLARE_ACCOUNT_ID      your Cloudflare account id
#   CONGRESS_API_KEY           from https://api.congress.gov/sign-up/
#   GEMINI_API_KEY             from https://aistudio.google.com/ -> "Get API key"
#   ADMIN_TOKEN                any random string; protects /admin/* routes
#
# Optional secret:
#   CLOUDFLARE_D1_DATABASE_ID  overrides the database_id committed in
#                              wrangler.toml. Leave unset to use the
#                              value already in the file.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # PR validations: group per head branch so two commits to the same PR
  # cancel the in-flight validation. Main deploys: single "main" group, never
  # cancelled in progress so two fast merges deploy in order.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Cloudflare
    # Deploy only runs on pushes to main (which includes PR merges) and on
    # manual workflow_dispatch runs from main. Pull-request events skip this
    # job entirely — they only validate.
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Inject D1 database id into wrangler.toml
        # Override the committed database_id with the secret, if set. If the
        # secret is unset/empty we MUST NOT overwrite — otherwise the next
        # step fails with "Found a database with name or binding
        # congress_one but it is missing a database_id". Database IDs aren't
        # actually secret (they're visible in the Cloudflare dashboard), so
        # it's fine to keep the real one committed in wrangler.toml and
        # treat this step as a no-op override.
        run: |
          python3 - <<'PY'
          import os, re, pathlib, sys
          p = pathlib.Path("wrangler.toml")
          text = p.read_text()
          db_id = os.environ.get("CLOUDFLARE_D1_DATABASE_ID", "").strip()
          if not db_id:
              print(
                  "CLOUDFLARE_D1_DATABASE_ID is unset or empty; "
                  "using database_id already committed in wrangler.toml"
              )
              # Sanity check: the committed file must have a non-empty id,
              # otherwise the next step will fail and the error will be
              # harder to diagnose than this message.
              m = re.search(r'database_id\s*=\s*"([^"]*)"', text)
              if not m or not m.group(1):
                  print(
                      "ERROR: wrangler.toml has no committed database_id and "
                      "no CLOUDFLARE_D1_DATABASE_ID secret was provided. "
                      "Set the secret or commit the id to wrangler.toml.",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              print(f"committed database_id = {m.group(1)}")
              sys.exit(0)
          text = re.sub(
              r'database_id\s*=\s*"[^"]*"',
              f'database_id = "{db_id}"',
              text,
          )
          p.write_text(text)
          print("wrangler.toml database_id updated from secret")
          PY
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Apply D1 schema (idempotent)
        run: npx wrangler d1 execute congress_one --remote --file=./schema.sql

      - name: Apply D1 column migrations (idempotent)
        # Adds new columns to existing databases without failing if they
        # already exist. See scripts/migrate.sh for the details — this is
        # how we extend the `bills` table with new impact/tag columns
        # without dropping data.
        run: ./scripts/migrate.sh --remote

      - name: Push secrets
        run: |
          printf '%s' "$CONGRESS_API_KEY" | npx wrangler secret put CONGRESS_API_KEY
          printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY
          printf '%s' "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Deploy Worker
        id: deploy
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee deploy.log
          # Extract the first *.workers.dev URL wrangler printed, if any.
          WORKER_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -n1 || true)
          echo "worker_url=${WORKER_URL}" >> "$GITHUB_OUTPUT"

      - name: Write deploy summary
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          TRIGGER: ${{ github.event_name }}
        run: |
          {
            if [ "$DEPLOY_OUTCOME" = "success" ]; then
              echo "## Deploy succeeded"
              echo ""
              if [ -n "$WORKER_URL" ]; then
                echo "**Worker URL:** $WORKER_URL"
                echo ""
              fi
            else
              echo "## Deploy failed"
              echo ""
            fi
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit | \`$COMMIT_SHA\` |"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Actor | @$ACTOR |"
          } >> "$GITHUB_STEP_SUMMARY"
