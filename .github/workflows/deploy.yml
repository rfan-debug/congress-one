name: Deploy to Cloudflare Workers

# Pipeline stages:
#   1. Type-check TypeScript
#   2. Apply D1 schema (idempotent)
#   3. Push non-secret vars & all secrets via `wrangler secret put`
#   4. `wrangler deploy` the Worker (which also registers the weekly cron)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN       scoped to "Edit Cloudflare Workers" + D1
#   CLOUDFLARE_ACCOUNT_ID      your Cloudflare account id
#   CLOUDFLARE_D1_DATABASE_ID  id of the D1 database you created
#   CONGRESS_API_KEY           from https://api.congress.gov/sign-up/
#   ANTHROPIC_API_KEY          from https://console.anthropic.com/
#   ADMIN_TOKEN                any random string; protects /admin/* routes

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Inject D1 database id into wrangler.toml
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("wrangler.toml")
          text = p.read_text()
          db_id = os.environ["CLOUDFLARE_D1_DATABASE_ID"]
          text = re.sub(
              r'database_id\s*=\s*"[^"]*"',
              f'database_id = "{db_id}"',
              text,
          )
          p.write_text(text)
          print("wrangler.toml database_id updated")
          PY
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Apply D1 schema (idempotent)
        run: npx wrangler d1 execute congress_one --remote --file=./schema.sql

      - name: Push secrets
        run: |
          printf '%s' "$CONGRESS_API_KEY" | npx wrangler secret put CONGRESS_API_KEY
          printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY
          printf '%s' "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Deploy Worker
        run: npx wrangler deploy
